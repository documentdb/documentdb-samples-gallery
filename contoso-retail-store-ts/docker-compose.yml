services:
  documentdb:
    image: ghcr.io/microsoft/documentdb/documentdb-local:latest
    container_name: docdb-azure-primary
    ports:
      - "10260:10260"
    environment:
      - USERNAME=docdbuser
      - PASSWORD=documentdb
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: docdb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:

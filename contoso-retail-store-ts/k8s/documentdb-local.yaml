apiVersion: v1
kind: Namespace
metadata:
  name: retail-docdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: documentdb
  namespace: retail-docdb
spec:
  serviceName: documentdb
  replicas: 1
  selector:
    matchLabels:
      app: documentdb
  template:
    metadata:
      labels:
        app: documentdb
    spec:
      containers:
        - name: documentdb
          image: ghcr.io/microsoft/documentdb/documentdb-local:latest
          ports:
            - containerPort: 10260
              name: gateway
          env:
            - name: USERNAME
              value: docdbuser
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documentdb-secret
                  key: password
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: documentdb
  namespace: retail-docdb
spec:
  selector:
    app: documentdb
  ports:
    - port: 10260
      targetPort: 10260
      name: gateway
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: documentdb-secret
  namespace: retail-docdb
type: Opaque
stringData:
  password: documentdb  # Replace with your actual password

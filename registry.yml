samples:
  - id: book-finder-js
    title: "BookFinder: AI-Powered Semantic Book Discovery"
    description: "A Node.js/Express app that uses OpenAI embeddings and DocumentDB vector search to let users discover books through natural language queries like 'dystopian future with rebellion'."
    language: Node.js
    industry: AI/ML
    difficulty: Intermediate
    tags:
      - Vector Search
      - OpenAI
      - Embeddings
      - Express
      - Semantic Search
    githubUrl: "https://github.com/documentdb/documentdb-samples-gallery/tree/main/book-finder-js"

  - id: quickstart-vector-search-python
    title: "Quickstart: Vector Search with Python in Azure DocumentDB"
    description: "Python quickstart that uses Azure OpenAI embeddings and Azure DocumentDB vector indexes (IVF, HNSW, DiskANN) to run semantic hotel search over an embeddings-enriched dataset."
    language: Python
    industry: AI/ML
    difficulty: Beginner
    tags:
      - Vector Search
      - Azure DocumentDB
      - Python
      - Embeddings
      - Semantic Search
